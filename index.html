<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07070f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Rise From Nothing</title>
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>

  <!-- ── 3D World ── -->
  <canvas id="world-canvas"></canvas>

  <div id="app">

    <!-- ── Floating text layer ── -->
    <div id="float-container"></div>

    <!-- ── HUD Overlay ── -->
    <div id="hud">
      <div id="hud-left">
        <div id="capital-chip">
          <span class="chip-icon">₱</span>
          <span id="capital-display">0</span>
        </div>
        <div id="stats-chips">
          <div class="stat-chip">
            <span class="stat-chip-label">EARNED</span>
            <span class="stat-chip-value" id="total-earned">₱0</span>
          </div>
          <div class="stat-chip">
            <span class="stat-chip-label">RATE</span>
            <span class="stat-chip-value" id="income-per-sec">₱0/s</span>
          </div>
        </div>
      </div>
      <div id="hud-right">
        <div id="job-chip">
          <span class="job-chip-dot"></span>
          <span id="current-job-name">Beggar</span>
        </div>
        <button class="hud-btn" id="menu-btn" onclick="togglePanel()">☰</button>
        <button class="hud-btn hud-btn-danger" onclick="resetGame()">↺</button>
      </div>
    </div>

    <!-- ── World Controls ── -->
    <div id="joystick-base"><div id="joystick-knob"></div></div>
    <button id="run-btn">RUN</button>
    <button id="jump-btn">JUMP</button>
    <button id="interact-btn" class="hidden" onclick="interactWithBusiness()">!</button>

    <!-- ── Panel Sheet ── -->
    <div id="panel-sheet">
      <div class="panel-handle" onclick="togglePanel()"></div>

      <!-- Panel Tab Nav -->
      <div id="panel-tabs">
        <button class="panel-tab active" onclick="switchPanelTab('job', this)">
          <span class="ptab-icon">👤</span><span class="ptab-label">JOB</span>
        </button>
        <button class="panel-tab" onclick="switchPanelTab('unlock', this)">
          <span class="ptab-icon">🔓</span><span class="ptab-label">CAREER</span>
        </button>
        <button class="panel-tab" onclick="switchPanelTab('business', this)">
          <span class="ptab-icon">🏢</span><span class="ptab-label">BIZ</span>
        </button>
      </div>

      <main id="game-main">

        <!-- Job Section -->
        <section class="game-section" id="job-section">
          <div class="section-header">
            <span class="section-icon">👤</span>
            <h2 class="section-title">YOUR JOB</h2>
            <span class="section-badge" id="current-job-name-panel">Beggar</span>
          </div>
          <div class="job-tabs" id="job-tabs"></div>
          <div class="actions-grid" id="actions-grid"></div>
        </section>

        <!-- Career Upgrades -->
        <section class="game-section" id="unlock-section">
          <div class="section-header">
            <span class="section-icon">🔓</span>
            <h2 class="section-title">CAREER UPGRADES</h2>
          </div>
          <div class="unlock-list" id="unlock-list"></div>
        </section>

        <!-- Businesses -->
        <section class="game-section" id="business-section">
          <div class="section-header">
            <span class="section-icon">🏢</span>
            <h2 class="section-title">BUSINESSES</h2>
          </div>
          <div class="business-grid" id="business-grid"></div>
        </section>

      </main>
    </div>

    <!-- ── Offline Modal ── -->
    <div id="offline-modal" class="modal hidden">
      <div class="modal-overlay" onclick="closeOfflineModal()"></div>
      <div class="modal-card">
        <div class="modal-icon">💰</div>
        <h3 class="modal-title">WELCOME BACK</h3>
        <p class="modal-text">Your businesses kept grinding while you were away.</p>
        <div class="modal-amount" id="offline-amount">+₱0</div>
        <button class="btn-primary" onclick="closeOfflineModal()">COLLECT</button>
      </div>
    </div>

  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/audio.js"></script>
  <script src="assets/js/save.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/game.js"></script>
  <script type="module" src="assets/js/world.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', initGame);

    // Panel tab switcher
    function switchPanelTab(tab, btn) {
      document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ['job-section','unlock-section','business-section'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
      const map = { job: 'job-section', unlock: 'unlock-section', business: 'business-section' };
      const el = document.getElementById(map[tab]);
      if (el) el.style.display = '';
    }
  </script>
  <script>
(() => {
  const lockLandscape = async () => {
    try {
      if (screen.orientation?.lock) {
        await screen.orientation.lock('landscape');
      }
    } catch (e) {}
  };

  document.addEventListener('click', lockLandscape, { once: true });
  document.addEventListener('touchstart', lockLandscape, { once: true });

  const rotateOverlay = document.createElement('div');
  rotateOverlay.id = 'rotate-device-overlay';
  rotateOverlay.innerHTML = `
    <div class="rotate-card">
      <div class="rotate-icon">📱</div>
      <div class="rotate-title">Rotate Device</div>
      <div class="rotate-subtitle">
        Enable auto-rotate and switch to landscape to play.
      </div>
    </div>
  `;
  document.body.appendChild(rotateOverlay);

  const updateOrientation = () => {
    const portrait = window.innerHeight > window.innerWidth;
    rotateOverlay.style.display = portrait ? 'flex' : 'none';
  };

  window.addEventListener('resize', updateOrientation);
  window.addEventListener('orientationchange', updateOrientation);
  updateOrientation();
})();
</script>
</body>
</html>
